name: 'CI Parity Check'
description: 'Statically catch the failures that pass locally but fail in CI: version drift, stale lockfiles, missing env, OS-only steps.'
author: 'fernforge'
branding:
  icon: 'shield'
  color: 'green'
inputs:
  path:
    description: 'Path to the repo to analyze'
    required: false
    default: '.'
  strict:
    description: 'Exit non-zero on warnings too, not just errors'
    required: false
    default: 'false'
  warn-only:
    description: 'Never exit non-zero (report only)'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: Run ci-parity
      shell: bash
      run: |
        args=("${{ inputs.path }}")
        if [ "${{ inputs.strict }}" = "true" ]; then args+=("--strict"); fi
        if [ "${{ inputs.warn-only }}" = "true" ]; then args+=("--warn-only"); fi
        npx --yes ci-parity@latest "${args[@]}"
